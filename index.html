let _audioCtx = null;
function playAnimalSound(animal) {
  try {
    const dataUrl = typeof ANIMAL_SOUNDS !== "undefined" ? ANIMAL_SOUNDS[animal.id] : null;
    if (!dataUrl) return;
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === "suspended") _audioCtx.resume();
    const b64 = dataUrl.split(",")[1];
    const binStr = atob(b64);
    const bytes = new Uint8Array(binStr.length);
    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
    _audioCtx.decodeAudioData(bytes.buffer.slice(0), function(buf) {
      const src = _audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(_audioCtx.destination);
      src.start(0);
    }, function(err) { console.warn("decodeAudioData error:", err); });
  } catch(e) {
    console.warn("Audio playback failed:", e);
  }
}

  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type="triangle";
    o.frequency.setValueAtTime(220, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime+0.15);
    g.gain.setValueAtTime(0.5, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.2);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.25);
  } catch(e){}
}

/* ================================================================
   Floating Particles Background
   ================================================================ */
function Particles() {
  const particles = Array.from({length:25}).map((_,i) => ({
    id: i,
    left: Math.random()*100,
    delay: Math.random()*8,
    duration: 6 + Math.random()*6,
    size: 2 + Math.random()*3,
    opacity: 0.2 + Math.random()*0.4,
  }));
  return (
    <div className="particles">
      {particles.map(p => (
        <div key={p.id} className="particle" style={{
          left: p.left+"%", width: p.size, height: p.size,
          animationDelay: p.delay+"s", animationDuration: p.duration+"s",
          opacity: p.opacity,
        }}/>
      ))}
    </div>
  );
}

/* ================================================================
   Toast
   ================================================================ */
function Toast({message, type="success", onDone}) {
  const [leaving, setLeaving] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setLeaving(true), 2500);
    const t2 = setTimeout(() => onDone?.(), 3000);
    return () => { clearTimeout(t1); clearTimeout(t2) };
  }, [onDone]);
  return <div className={`toast ${type} ${leaving?"out":""}`}>{message}</div>;
}

/* ================================================================
   Tablet Card

/* ================================================================
   Cat Paw Incense
   ================================================================ */
function CatPawIncense({count, onDone}) {
  const [phase, setPhase] = useState("in");

    const t1 = setTimeout(() => setPhase("out"), 1200);
    const t2 = setTimeout(() => onDone?.(), 1800);

  }, [onDone]);
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div className={`cat-paw-anim ${phase}`} style={{fontSize:64,lineHeight:1,filter:"drop-shadow(0 0 10px rgba(255,215,0,0.4))"}}>🐾</div>

        {Array.from({length:count}).map((_,i) => <div key={i} className="incense-stick"/>)}

/* ================================================================
   Archery Game View - Space Invaders Style
   ================================================================ */
function ArcheryGameView({tablets}) {
  const [selectedName, setSelectedName] = useState(null);
  const [gamePhase, setGamePhase] = useState("select");
  const [displayScore, setDisplayScore] = useState(0);
  const [highScore, setHighScore] = useState(0);
  const [timeLeft, setTimeLeft] = useState(30);
  const [playerName, setPlayerName] = useState("");
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const canvasRef = useRef(null);
  const gameRef = useRef(null);

  const GAME_W = 360;
  const GAME_H = 400;
  const TW = 38;
  const TH = 55;

  const GAME_TIME = 30;

  const startGame = (name) => {
    setSelectedName(name);
    setGamePhase("playing");
    setDisplayScore(0);
    setTimeLeft(GAME_TIME);
    setSaved(false);
    setPlayerName("");
    gameRef.current = {
      tablets: [],
      arrows: [],
      explosions: [],
      archerX: GAME_W / 2,
      score: 0,
      running: true,
      spawnTimer: 0,
      frameCount: 0,
      name: name,
      lastClickTime: 0,
      startTime: Date.now(),
      timeLeft: GAME_TIME,
    };
  };

  const saveScore = async (pName, score) => {
    if (!pName.trim() || saving) return;
    setSaving(true);
    try {
      await fetch(GAS_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({action:"saveScore",playerName:pName.trim(),score:score,targetName:selectedName,date:new Date().toISOString()}),
      });
      setSaved(true);
    } catch(e) {
      console.warn("Score save failed:", e.message);
    }
    setSaving(false);
  };

  const handleCanvasInteraction = (e) => {
    const g = gameRef.current;
    if (!g || !g.running) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = GAME_W / rect.width;
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    const x = (clientX - rect.left) * scaleX;
    g.archerX = Math.max(20, Math.min(GAME_W - 20, x));
    g.arrows.push({ x: g.archerX, y: GAME_H - 55 });
  };

  const handleCanvasMove = (e) => {
    const g = gameRef.current;
    if (!g || !g.running) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = GAME_W / rect.width;
    let clientX;
    if (e.touches) {
      e.preventDefault();
      clientX = e.touches[0].clientX;
    } else {
      clientX = e.clientX;
    }
    const x = (clientX - rect.left) * scaleX;
    g.archerX = Math.max(20, Math.min(GAME_W - 20, x));
  };

  useEffect(() => {
    if (gamePhase !== "playing") return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const g = gameRef.current;
    if (!g) return;

    const stars = Array.from({length: 40}, () => ({
      x: Math.random() * GAME_W,
      y: Math.random() * GAME_H * 0.65,
      size: 0.5 + Math.random() * 2,
      alpha: 0.2 + Math.random() * 0.5,
      twinkle: Math.random() * Math.PI * 2,
    }));

    const gameLoop = () => {
      if (!g.running) return;
      g.frameCount++;

      const elapsed = (Date.now() - g.startTime) / 1000;
      g.timeLeft = Math.max(0, GAME_TIME - elapsed);
      if (g.frameCount % 6 === 0) setTimeLeft(Math.ceil(g.timeLeft));

      if (g.timeLeft <= 0) {
        g.running = false;
        setTimeLeft(0);
        setHighScore(prev => Math.max(prev, g.score));
        setGamePhase("gameover");
        return;
      }

      const difficulty = Math.min(g.frameCount / 500, 8);
      const spawnInterval = Math.max(20, 80 - difficulty * 7);
      const speedMin = 1.2 + difficulty * 0.25;
      const speedMax = 2.5 + difficulty * 0.35;

      g.spawnTimer++;
      if (g.spawnTimer >= spawnInterval) {
        g.tablets.push({
          x: 10 + Math.random() * (GAME_W - TW - 20),
          y: -TH,
          speed: speedMin + Math.random() * (speedMax - speedMin),
        });
        g.spawnTimer = 0;
      }

      for (const t of g.tablets) {
        t.y += t.speed;
      }
      g.tablets = g.tablets.filter(t => t.y < GAME_H + TH);

      g.arrows = g.arrows.filter(a => { a.y -= 8; return a.y > -30; });

      const survivingArrows = [];
      for (const a of g.arrows) {
        let hitSomething = false;
        g.tablets = g.tablets.filter(t => {
          if (!hitSomething && a.x > t.x - 4 && a.x < t.x + TW + 4 && a.y > t.y && a.y < t.y + TH) {
            hitSomething = true;
            g.explosions.push({ x: t.x + TW / 2, y: t.y + TH / 2, frame: 0 });
            g.score += 10;
            setDisplayScore(g.score);
            return false;
          }
          return true;
        });
        if (!hitSomething) survivingArrows.push(a);
      }
      g.arrows = survivingArrows;

      g.explosions = g.explosions.filter(e => { e.frame++; return e.frame < 24; });

      /* === DRAW === */
      const sky = ctx.createLinearGradient(0, 0, 0, GAME_H);
      sky.addColorStop(0, "#030318");
      sky.addColorStop(0.5, "#12082a");
      sky.addColorStop(0.85, "#1e0f3a");
      sky.addColorStop(1, "#2a1545");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, GAME_W, GAME_H);

      for (const s of stars) {
        const flicker = 0.6 + 0.4 * Math.sin(g.frameCount * 0.03 + s.twinkle);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha * flicker})`;
        ctx.fill();
      }

      ctx.fillStyle = "#0d0520";
      ctx.fillRect(0, GAME_H - 8, GAME_W, 8);
      ctx.strokeStyle = "rgba(255,215,0,0.15)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, GAME_H - 8);
      ctx.lineTo(GAME_W, GAME_H - 8);
      ctx.stroke();

      for (const t of g.tablets) {
        ctx.save();
        ctx.shadowColor = "rgba(255,215,0,0.2)";
        ctx.shadowBlur = 8;
        const tg = ctx.createLinearGradient(t.x, t.y, t.x, t.y + TH);
        tg.addColorStop(0, "#3D2415");
        tg.addColorStop(0.3, "#5C3A1E");
        tg.addColorStop(0.5, "#8B5A2B");
        tg.addColorStop(0.7, "#5C3A1E");
        tg.addColorStop(1, "#3D2415");
        ctx.fillStyle = tg;
        ctx.fillRect(t.x, t.y, TW, TH);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "#FFD700";
        ctx.lineWidth = 2;
        ctx.strokeRect(t.x, t.y, TW, TH);
        ctx.strokeStyle = "rgba(255,215,0,0.25)";
        ctx.lineWidth = 1;
        ctx.strokeRect(t.x + 3, t.y + 3, TW - 6, TH - 6);
        ctx.fillStyle = "#FFF3B0";
        ctx.font = "bold 11px 'Noto Sans TC',sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        const chars = (g.name || "").split("");
        const startY = t.y + Math.max(4, (TH - chars.length * 14) / 2);
        chars.forEach((ch, i) => {
          ctx.fillText(ch, t.x + TW / 2, startY + i * 14);
        });
        ctx.restore();
      }

      for (const a of g.arrows) {
        ctx.fillStyle = "#CD853F";
        ctx.fillRect(a.x - 1.5, a.y + 4, 3, 18);
        ctx.fillStyle = "#FFD700";
        ctx.beginPath();
        ctx.moveTo(a.x, a.y - 4);
        ctx.lineTo(a.x - 5, a.y + 5);
        ctx.lineTo(a.x + 5, a.y + 5);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#FF4444";
        ctx.beginPath();
        ctx.moveTo(a.x - 3, a.y + 19);
        ctx.lineTo(a.x, a.y + 14);
        ctx.lineTo(a.x + 3, a.y + 19);
        ctx.closePath();
        ctx.fill();
      }

      for (const e of g.explosions) {
        const p = e.frame / 24;
        const r = 6 + p * 40;
        const a = Math.max(0, 1 - p);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.beginPath();
        ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,80,0,${a * 0.3})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x, e.y, r * 0.55, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,180,0,${a * 0.5})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x, e.y, r * 0.25, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,200,${a * 0.9})`;
        ctx.fill();
        for (let i = 0; i < 8; i++) {
          const angle = (Math.PI * 2 / 8) * i + p * 3;
          const dist = r * (0.6 + p * 0.4);
          const px = e.x + Math.cos(angle) * dist;
          const py = e.y + Math.sin(angle) * dist;
          ctx.beginPath();
          ctx.arc(px, py, 2.5 * (1 - p), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,215,0,${a * 0.8})`;
          ctx.fill();
        }
        ctx.restore();
      }

      /* Stick figure archer */
      const ax = g.archerX;
      const ay = GAME_H - 12;
      ctx.strokeStyle = "#E8DCC8";
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.arc(ax, ay - 40, 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ax, ay - 34);
      ctx.lineTo(ax, ay - 16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ax, ay - 16);
      ctx.lineTo(ax - 7, ay - 3);
      ctx.moveTo(ax, ay - 16);
      ctx.lineTo(ax + 7, ay - 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ax, ay - 28);
      ctx.lineTo(ax - 3, ay - 37);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ax, ay - 28);
      ctx.lineTo(ax + 3, ay - 37);
      ctx.stroke();
      ctx.strokeStyle = "#A0522D";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ax, ay - 46, 10, Math.PI * 0.25, Math.PI * 0.75);
      ctx.stroke();
      const bx1 = ax + 10 * Math.cos(Math.PI * 0.25);
      const by1 = ay - 46 + 10 * Math.sin(Math.PI * 0.25);
      const bx2 = ax + 10 * Math.cos(Math.PI * 0.75);
      const by2 = ay - 46 + 10 * Math.sin(Math.PI * 0.75);
      ctx.strokeStyle = "#FFD700";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bx1, by1);
      ctx.lineTo(bx2, by2);
      ctx.stroke();

      /* HUD */
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, GAME_W, 32);
      ctx.fillStyle = "#FFD700";
      ctx.font = "bold 14px 'Noto Sans TC',sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText("得分: " + g.score, 10, 16);
      ctx.textAlign = "center";
      const tColor = g.timeLeft <= 5 ? "#FF4444" : g.timeLeft <= 10 ? "#FFA500" : "#4FC3F7";
      ctx.fillStyle = tColor;
      ctx.font = "bold 16px 'Noto Sans TC',sans-serif";
      ctx.fillText(Math.ceil(g.timeLeft) + "s", GAME_W / 2, 16);
      ctx.textAlign = "right";
      ctx.fillStyle = "rgba(232,220,200,0.5)";
      ctx.font = "11px 'Noto Sans TC',sans-serif";
      ctx.fillText("點擊射箭", GAME_W - 10, 16);

      g.frameId = requestAnimationFrame(gameLoop);
    };

    g.frameId = requestAnimationFrame(gameLoop);

    return () => {
      g.running = false;
      if (g.frameId) cancelAnimationFrame(g.frameId);
    };
  }, [gamePhase]);

  if (gamePhase === "select") {
    return (
      <div>
        <div className="sec-title">🏹 神射手</div>
        <div className="gcard">
          <p style={{color:T.textDim,marginBottom:6,fontSize:14}}>選擇牌位名字，開始射擊遊戲</p>
          <p style={{color:T.textDim,marginBottom:20,fontSize:12}}>牌位會從天空不斷掉下，射中就爆炸消失！</p>
          {highScore > 0 && <p style={{color:T.cyan,fontWeight:700,marginBottom:16,fontSize:14}}>最高分: {highScore}</p>}
          {tablets.length === 0 ? (
            <p style={{color:T.textDim}}>尚無牌位，請先立牌位</p>
          ) : (
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {tablets.map(t => (
                <button key={t.id} className="gbtn" onClick={() => startGame(t.name)}>
                  {t.name}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  if (gamePhase === "gameover") {
    return (
      <div>
        <div className="sec-title">🏹 神射手</div>
        <div className="gcard" style={{textAlign:"center",padding:30}}>
          <div style={{fontSize:48,marginBottom:12}}>💥</div>
          <p style={{fontWeight:900,fontSize:22,color:T.gold,marginBottom:4}}>時間到</p>
          <p style={{fontSize:40,fontWeight:900,color:T.gold,marginBottom:4}}>{displayScore} 分</p>
          {displayScore >= highScore && displayScore > 0 && <p style={{color:T.cyan,fontWeight:700,fontSize:14,marginBottom:12}}>新紀錄！</p>}
          <p style={{color:T.textDim,fontSize:13,marginBottom:20}}>最高分: {highScore}</p>
          {!saved && (
            <div style={{marginBottom:20}}>
              <p style={{color:T.text,fontSize:13,marginBottom:8}}>輸入名字記錄成績</p>
              <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}}>
                <input className="ginput" value={playerName} onChange={e=>setPlayerName(e.target.value)} placeholder="你的名字" style={{maxWidth:160,textAlign:"center"}} maxLength={10}/>
                <button className="gbtn gbtn-primary" onClick={()=>saveScore(playerName,displayScore)} disabled={saving||!playerName.trim()}>{saving?"儲存中...":"儲存成績"}</button>
              </div>
            </div>
          )}
          {saved && <p style={{color:T.cyan,fontWeight:700,fontSize:13,marginBottom:16}}>成績已儲存</p>}
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button className="gbtn gbtn-primary gbtn-lg" onClick={() => startGame(selectedName)}>再玩一次</button>
            <button className="gbtn" onClick={() => { setGamePhase("select"); setSelectedName(null) }}>換目標</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="sec-title">🏹 神射手</div>
      <div className="gcard" style={{marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,padding:"10px 16px"}}>
        <span style={{fontWeight:700,color:T.gold,fontSize:13}}>目標: {selectedName}</span>
        <span style={{fontWeight:900,fontSize:18,color:timeLeft<=5?T.red:timeLeft<=10?"#FFA500":T.cyan}}>{timeLeft}s</span>
        <span style={{fontWeight:900,fontSize:18,color:T.cyan}}>{displayScore} 分</span>
        <button className="gbtn gbtn-sm" onClick={() => { if(gameRef.current) gameRef.current.running=false; setGamePhase("select"); setSelectedName(null) }}>結束</button>
      </div>
      <div className="gcard" style={{padding:0,overflow:"hidden",cursor:"crosshair",touchAction:"none"}}>
        <canvas
          ref={canvasRef}
          width={GAME_W}
          height={GAME_H}
          style={{width:"100%",height:"auto",display:"block"}}
          onClick={handleCanvasInteraction}
          onTouchStart={handleCanvasInteraction}
          onMouseMove={handleCanvasMove}
          onTouchMove={handleCanvasMove}
        />
      </div>
      <p style={{textAlign:"center",marginTop:10,color:T.textDim,fontSize:12}}>點擊畫面射箭，滑動移動弓箭手，牌位揉到地面則遊戲結束</p>
    </div>
  );
}

/* ================================================================
   Settings View
   ================================================================ */
function SettingsView({gasUrl, onGasUrlChange, onConnect, connected, tablets}) {
  return (
    <div>
      <div className="sec-title">⚙️ 設定</div>
      <div className="gcard" style={{marginBottom:16}}>
        <label style={{fontWeight:700,marginBottom:8,display:"block",color:T.gold,fontSize:14}}>Google Apps Script URL</label>
        <p style={{color:T.textDim,fontSize:13,marginBottom:10}}>請將 GAS Web App 的 URL 貼到下方</p>
        <div className="responsive-flex" style={{display:"flex",gap:10}}>
          <input className="ginput" style={{flex:1}} placeholder="https://script.google.com/macros/s/xxx/exec" value={gasUrl} onChange={e=>onGasUrlChange(e.target.value)}/>
          <button className="gbtn gbtn-primary mobile-full" onClick={onConnect}>{connected?"重新連線":"連線"}</button>
        </div>
        {connected && <div style={{marginTop:10,color:T.green,fontWeight:700,fontSize:13}}>✅ 已連線成功</div>}
      </div>
      <div className="gcard">
        <h3 style={{fontWeight:700,marginBottom:8,color:T.gold,fontSize:14}}>目前牌位資料</h3>
        <p style={{color:T.textDim,fontSize:13,marginBottom:10}}>共 {tablets.length} 個牌位</p>
        {tablets.length>0 && (
          <div style={{maxHeight:200,overflow:"auto"}}>
            {tablets.map(t => (
              <div key={t.id} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",fontSize:14}}>
                <span style={{color:T.textBright}}>{t.name}</span>
                <span style={{color:T.textDim}}>🔥 {t.incenseCount}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ================================================================
   Footer
   ================================================================ */
function Footer() {
  return <div className="footer">v0.0.1 | ©2026 <a href="https://huobest.com/" target="_blank" rel="noopener noreferrer">霍家私塾</a></div>;
}

/* ================================================================
   Main App
   ================================================================ */
function App() {
  const [view, setView] = useState("hall");
  const [tablets, setTablets] = useState([]);
  const [selectedTablet, setSelectedTablet] = useState(null);
  const [gasUrl, setGasUrl] = useState(GAS_URL);
  const [connected, setConnected] = useState(false);
  const [toasts, setToasts] = useState([]);

  useEffect(() => { const s=document.createElement("style"); s.textContent=CSS; document.head.appendChild(s); return()=>document.head.removeChild(s) },[]);
  useEffect(() => { const h=e=>{if(tablets.length>0){e.preventDefault();e.returnValue=""}}; window.addEventListener("beforeunload",h); return()=>window.removeEventListener("beforeunload",h) },[tablets]);
  useEffect(() => { if(GAS_URL) doConnect(GAS_URL) },[]);

  const addToast = useCallback((msg,type="success") => { setToasts(p=>[...p,{id:Date.now(),message:msg,type}]) },[]);
  const removeToast = useCallback(id => { setToasts(p=>p.filter(t=>t.id!==id)) },[]);

  const doConnect = async(url) => {
    const u = url||gasUrl;
    if(!u.trim()){addToast("請輸入 GAS URL","error");return}
    try {
      const r = await fetch(u.trim(), {redirect:"follow"});
      if(!r.ok){ addToast("連線失敗：HTTP "+r.status,"error"); return }
      const text = await r.text();
      let d;
      try { d = JSON.parse(text) } catch(pe){ addToast("回傳格式錯誤（非 JSON）","error"); console.warn("GAS response:",text.slice(0,200)); return }
      if(Array.isArray(d)){
        const loaded = d.map((row,i)=>({id:row.id||`gas-${i}`,name:row.name||row[0]||"",incenseCount:parseInt(row.incenseCount||row[1]||0,10),createdAt:row.createdAt||row[2]||new Date().toISOString()})).filter(t=>t.name);
        setTablets(loaded);setConnected(true);
        addToast("連線成功！已載入 "+loaded.length+" 個牌位","info");
      } else { setConnected(true); addToast("連線成功！","info") }
    } catch(e){ addToast("連線失敗："+e.message,"error"); console.error("doConnect error:",e) }
  };

  const syncToGas = async(updated) => {
    if(!gasUrl.trim()||!connected) return;
    try { await fetch(gasUrl.trim(),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tablets:updated}),mode:"no-cors"}) } catch(e){}
  };

  const handleCreate = (name,count) => {
    const nt = {id:`t-${Date.now()}`,name,incenseCount:count,createdAt:new Date().toISOString()};
    const up = [...tablets,nt]; setTablets(up); syncToGas(up);
    addToast("「"+name+"」牌位已立，上了 "+count+" 柱香");
  };

  const handleAddIncense = (id,count) => {
    const up = tablets.map(t=>t.id===id?{...t,incenseCount:t.incenseCount+count}:t);
    setTablets(up); syncToGas(up);
    addToast("己為「"+(up.find(t=>t.id===id)?.name)+"」上了 "+count+" 柱香");
  };

  const renderView = () => {
    switch(view){
      case "hall": return <HallView tablets={tablets} onSelectTablet={setSelectedTablet}/>;
      case "create": return <CreateTabletView onCreate={handleCreate}/>;
      case "woodenfish": return <WoodenFishView/>;
      case "leaderboard": return <LeaderboardView tablets={tablets}/>;
      case "punishments": return <PunishmentView tablets={tablets}/>;
      case "archery": return <ArcheryGameView tablets={tablets}/>;
      case "settings": return <SettingsView gasUrl={gasUrl} onGasUrlChange={setGasUrl} onConnect={()=>doConnect(gasUrl)} connected={connected} tablets={tablets}/>;
      default: return null;
    }
  };

  return (
    <div className="game-bg">
      <Particles/>
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",gap:8,pointerEvents:"none"}}>
        {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onDone={()=>removeToast(t.id)}/>)}
      </div>

      <div style={{position:"relative",zIndex:10,padding:"16px 20px",borderBottom:`1px solid ${T.border}`,background:"rgba(20,10,30,0.95)",backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <span style={{fontSize:28}}>🐾</span>
          <h1 style={{fontSize:22,fontWeight:900,color:T.gold,textShadow:"0 0 20px rgba(255,215,0,0.3)",letterSpacing:2}}>靈堂大典</h1>
          <div style={{flex:1}}/>
          {connected && <span style={{fontSize:11,color:T.green,fontWeight:600,background:"rgba(16,185,129,0.15)",padding:"3px 10px",borderRadius:20,border:`1px solid rgba(16,185,129,0.3)`}}>● 已連線</span>}
        </div>
        <nav className="game-nav">
          {VIEWS.map(v => (
            <button key={v.id} className={`nav-btn ${view===v.id?"active":""}`} onClick={()=>setView(v.id)}>
              <span className="nav-icon">{v.icon}</span>
              <span>{v.label}</span>
            </button>
          ))}
        </nav>
      </div>

      <div style={{position:"relative",zIndex:10,flex:1,padding:20,maxWidth:900,width:"100%",margin:"0 auto"}}>
        {renderView()}
      </div>

      {selectedTablet && (
        <EnlargedTabletView tablet={selectedTablet} onClose={()=>setSelectedTablet(null)}
          onAddIncense={(id,count) => { handleAddIncense(id,count); setSelectedTablet(prev=>prev?{...prev,incenseCount:prev.incenseCount+count}:null) }}
        />
      )}

      <Footer/>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
